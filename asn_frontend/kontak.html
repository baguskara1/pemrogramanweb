<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak TIKSHOP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo"> TIKSHOP</a>
        <nav>
            <ul>
                <li><a href="index.html">Beranda</a></li>
                <li><a href="produk.html">Produk</a></li>
                <li><a href="kontak.html">Kontak</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="kategori-produk">
            <h2>Hubungi Kami</h2>
            <div class="wadah-formulir">
                <form action="/submit" method="post" class="formulir-kontak">
                    <label for="name">Nama</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>

                    <label for="message">Pesan</label>
                    <textarea name="message" id="message" rows="4" required></textarea>

                    <button type="submit" name="submit" class="tombol-kirim">Kirim Pesan</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>TIKSHOP SEMUA ADA SEMUA MURAH.</p>
        <p>GET US ON APPSTORE / PLAYSTORE.</p>
    </footer>
</body>
</html>
