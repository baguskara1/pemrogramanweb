<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental</title>
    <link rel="stylesheet" href="style_lat.css">
</head>

<body>
    <div id="search">
        <div class="title">
            <h1>Car Rental</h1>
            <p>Find the perfect car for your next adventure</p>
            <hr>
        </div>
        <div class="form-container">
            <div class="form-group">
                <label for="pickup">Rental Location:</label>
                <select id="pickup" name="pickup">
                    <option value="">Select Location</option>
                    <option value="location1">Godean</option>
                    <option value="location2">Yogyakarta</option>
                    <option value="location3">Bali</option>
                </select>
            </div>
            <div class="form-group">
                <label for="pickup-date">Rental Start Date:</label>
                <input type="date" id="pickup-date" name="pickup-date">
            </div>
            <div class="form-group">
                <label for="return-date">Rental End Date:</label>
                <input type="date" id="return-date" name="return-date">
            </div>
            <button type="submit">Search</button>
        </div>
    </div>

    <div class="car-list">
        <h2>Car List</h2>
        <div class="car-item">
            <img src="https://i.pinimg.com/1200x/b4/96/b8/b496b8d5573612b9408093dcdda9fec3.jpg" alt="NISSAN NSX">
            <h3>NISSAN NSX</h3>
            <p>Car Detail</p>
        </div>
        <div class="car-item">
            <img src="https://i.pinimg.com/736x/72/88/83/728883b405b37ea6581e815e74445b10.jpg" alt="AVENTADOR">
            <h3>LAMBORGHINI AVENTADOR</h3>
            <p>Car Detail</p>
        </div>
        <div class="car-item">
            <img src="https://i.pinimg.com/1200x/24/e9/f8/24e9f8ddd447184d0e1022b3cf319306.jpg" alt="Car 2">
            <h3>911 PORSCHE</h3>
            <p>Car Detail</p>
        </div>
        <div class="car-item">
            <img src="https://i.pinimg.com/736x/87/3f/02/873f02a076edafcf284ea8fcf5b75b07.jpg" alt="Car 2">
            <h3>TOYOTA ALPHARD</h3>
            <p>Car Detail</p>
        </div>
    </div>
</body>

</html>
